# Nginx configuration file for ft_onion

# Run Nginx in the foreground (useful for Docker)
daemon off;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        # Listen on port 80 for HTTP traffic
        listen 80 default_server;
        listen [::]:80 default_server;

        # The root directory where index.html is located
        root /var/www/html;
        index index.html;

        # Catch-all server name
        server_name _;

        location / {
            # Try to serve the file, otherwise return 404
            try_files $uri $uri/ =404;
        }
    }
}